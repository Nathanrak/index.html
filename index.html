<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS BET PRO - FINAL V5</title>
    <style>
        :root { --blue: #00d4ff; --green: #39ff14; --red: #ff3131; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { width: 100%; max-width: 420px; background: #161b22; border-radius: 15px; padding: 15px; border: 1px solid #333; }
        
        /* 1. VALINY (PREDICTIONS) - EO AMBONY */
        .results-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 25px; }
        .res-card { background: #0d1117; padding: 12px 5px; border-radius: 10px; text-align: center; border: 1px solid #333; position: relative; }
        .res-card small { font-size: 9px; color: #888; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .v-main { font-size: 19px; font-weight: bold; display: block; margin-bottom: 2px; }
        .v-time { font-size: 11px; color: var(--blue); display: block; background: rgba(0,212,255,0.1); padding: 2px; border-radius: 4px; margin-bottom: 5px; }
        
        /* PROBABILITY PERCENTAGE */
        .v-prob { font-size: 10px; font-weight: bold; color: var(--green); background: rgba(57, 255, 20, 0.1); padding: 2px 4px; border-radius: 10px; }

        .c-green { border-top: 4px solid var(--green); }
        .c-orange { border-top: 4px solid #ffd700; }
        .c-red { border-top: 4px solid var(--red); }

        /* 2. FAMPIDIRANA (INPUTS) - EO AMBANY */
        .input-section { background: #0d1117; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--blue); margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #1a1f26; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--blue); }
        
        .btn-main { width: 100%; padding: 16px; background: var(--blue); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; margin-top: 5px; }
        .btn-main:active { transform: scale(0.96); }

        .history { margin-top: 15px; font-size: 11px; color: #555; border-top: 1px solid #222; padding-top: 10px; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="results-grid">
        <div class="res-card c-green">
            <small>SÉCURITÉ</small>
            <span id="s-val" class="v-main" style="color:var(--green)">--.--x</span>
            <span id="s-time" class="v-time">--:--:--</span>
            <span id="s-prob" class="v-prob">0%</span>
        </div>
        <div class="res-card c-orange">
            <small>TENTATIVE</small>
            <span id="t-val" class="v-main" style="color:#ffd700">--.--x</span>
            <span id="t-time" class="v-time">--:--:--</span>
            <span id="t-prob" class="v-prob" style="color:#ffd700">0%</span>
        </div>
        <div class="res-card c-red">
            <small>RISQUE</small>
            <span id="r-val" class="v-main" style="color:var(--red)">--.--x</span>
            <span id="r-time" class="v-time">--:--:--</span>
            <span id="r-prob" class="v-prob" style="color:var(--red)">0%</span>
        </div>
    </div>

    <div class="input-section">
        <div class="group">
            <label>LERA DEPART (HH:MM:SS):</label>
            <input type="time" id="t-input" step="1">
        </div>
        <div class="group">
            <label>MULTIPLIER FARANY NIVOAKA:</label>
            <input type="number" id="m-input" placeholder="ex: 1.54" step="0.01">
        </div>
        <button class="btn-main" onclick="calculate()">HIKAJY VOKATRA</button>
    </div>

    <div class="history" id="logs"></div>
</div>

<script>
    function calculate() {
        const timeVal = document.getElementById('t-input').value;
        const multVal = parseFloat(document.getElementById('m-input').value);

        if(!timeVal || isNaN(multVal)) {
            alert("Fenoy tsara ny lera sy ny multiplier!");
            return;
        }

        let tParts = timeVal.split(':');
        let h = parseInt(tParts[0]);
        let m = parseInt(tParts[1]);
        let s = parseInt(tParts[2]) || 0;

        // Seed miankina amin'ny segondra sy multiplier
        let seed = (s + multVal) * 1.35;

        // Fikajiana isa dynamique
        let res1 = (1.40 + (Math.abs(Math.sin(seed)) * 0.50)).toFixed(2);
        let res2 = (2.30 + (Math.abs(Math.cos(seed)) * 2.50)).toFixed(2);
        let res3 = (6.00 + (Math.abs(Math.tan(seed % 1.5)) * 10.0)).toFixed(2);

        // Fikajiana Probability (Atao eo amin'ny 94% - 98% ho an'ny Sécurité)
        let prob1 = Math.floor(94 + (Math.random() * 4));
        let prob2 = Math.floor(85 + (Math.random() * 8));
        let prob3 = Math.floor(65 + (Math.random() * 15));

        const getT = (sec) => {
            let d = new Date();
            d.setHours(h, m, s);
            return new Date(d.getTime() + sec * 1000).toTimeString().split(' ')[0];
        };

        // Update UI
        document.getElementById('s-val').innerText = res1 + "x";
        document.getElementById('s-time').innerText = getT(45);
        document.getElementById('s-prob').innerText = prob1 + "%";

        document.getElementById('t-val').innerText = res2 + "x";
        document.getElementById('t-time').innerText = getT(90);
        document.getElementById('t-prob').innerText = prob2 + "%";

        document.getElementById('r-val').innerText = res3 + "x";
        document.getElementById('r-time').innerText = getT(140);
        document.getElementById('r-prob').innerText = prob3 + "%";

        // Logs
        document.getElementById('logs').innerHTML = `<div>[${timeVal}] -> ${res1}x (${prob1}%)</div>` + document.getElementById('logs').innerHTML;
    }
</script>

</body>
</html>
