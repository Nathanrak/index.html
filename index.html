<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS BET PREDICT PRO</title>
    <style>
        :root {
            --neon: #00fff2;
            --bg: #0d1117;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* --- CLOCK SECTION --- */
        .clock-container {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--neon);
            border-radius: 12px;
            box-shadow: 0 0 10px var(--neon);
            cursor: pointer;
            width: 250px;
        }

        #digital-clock {
            font-family: 'Courier New', monospace;
            font-size: 2.5rem;
            color: var(--neon);
            text-shadow: 0 0 5px var(--neon);
        }

        #digital-date {
            font-size: 0.8rem;
            opacity: 0.7;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .dots { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }

        /* --- MAIN APP SECTION --- */
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 350px;
            margin-top: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .predict-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 20px 0;
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon);
        }

        button {
            background: transparent;
            border: 2px solid var(--neon);
            color: var(--neon);
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 20px var(--neon);
        }

        /* --- HISTORY SECTION --- */
        .history {
            margin-top: 25px;
            width: 100%;
            text-align: left;
        }

        .history-title {
            font-size: 0.9rem;
            border-bottom: 1px solid #30363d;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .win-color { color: #00ff7f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="clock-container" onclick="changeColor()">
        <div id="digital-clock">
            <span id="h">00</span><span class="dots">:</span><span id="m">00</span><span class="dots">:</span><span id="s">00</span>
        </div>
        <div id="digital-date">...</div>
    </div>

    <div class="card">
        <h2 style="margin:0">BOSS BET</h2>
        <div class="predict-display" id="predictResult">x1.00</div>
        <button onclick="getPrediction()">PREDICT NOW</button>

        <div class="history">
            <div class="history-title">HISTORY LOG:</div>
            <div id="logList"></div>
        </div>
    </div>

    <script>
        // 1. Mampandeha ny ORA (24h)
        function updateUI() {
            const now = new Date();
            document.getElementById('h').textContent = String(now.getHours()).padStart(2, '0');
            document.getElementById('m').textContent = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('s').textContent = String(now.getSeconds()).padStart(2, '0');
            const options = { day: '2-digit', month: 'long', year: 'numeric' };
            document.getElementById('digital-date').textContent = now.toLocaleDateString('fr-FR', options);
        }
        setInterval(updateUI, 1000);
        updateUI();

        // 2. Prediction Logic
        function getPrediction() {
            const result = (Math.random() * (4.00 - 1.10) + 1.10).toFixed(2);
            document.getElementById('predictResult').innerText = "x" + result;

            // Ampiana ao amin'ny History
            const log = document.getElementById('logList');
            const time = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
            const entry = document.createElement('div');
            entry.className = 'history-item';
            entry.innerHTML = `<span>${time}</span> <span class="win-color">x${result}</span>`;
            log.prepend(entry);
        }

        // 3. Ova loko kisendrasendra
        function changeColor() {
            const newCol = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            document.documentElement.style.setProperty('--neon', newCol);
        }
    </script>
</body>
</html>
