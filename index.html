<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS BET - HAINGANA</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        .box { background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; max-width: 400px; margin: auto; }
        h2 { color: #00d4ff; text-align: center; margin: 0 0 15px 0; font-size: 20px; }
        
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }
        
        .btn { width: 100%; padding: 15px; background: #00d4ff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        .results { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .res-item { background: #000; padding: 10px; border-radius: 5px; text-align: center; border-top: 3px solid #00d4ff; }
        .res-item b { display: block; font-size: 18px; color: #39ff14; }
        .res-item i { font-size: 11px; color: #888; font-style: normal; }

        .history { margin-top: 20px; font-size: 12px; border-top: 1px solid #333; padding-top: 10px; }
        .h-line { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="box">
    <h2>BOSS BET PRO</h2>
    
    <label>LERA DEPART:</label>
    <input type="time" id="t_dep" step="1">

    <div style="display:flex; gap:10px;">
        <div style="flex:1">
            <label>MULT +1:</label>
            <input type="number" id="m1" placeholder="1.00">
        </div>
        <div style="flex:1">
            <label>MULT +2:</label>
            <input type="number" id="m2" placeholder="1.00">
        </div>
    </div>

    <button class="btn" onclick="haingana()">ANALYZE NOW</button>

    <div class="results">
        <div class="res-item">
            <i>SEC</i><b id="r1">---</b><i id="h1">--:--</i>
        </div>
        <div class="res-item" style="border-color:orange">
            <i>TENT</i><b id="r2" style="color:orange">---</b><i id="h2">--:--</i>
        </div>
        <div class="res-item" style="border-color:red">
            <i>RISQ</i><b id="r3" style="color:red">---</b><i id="h3">--:--</i>
        </div>
    </div>

    <div class="history" id="logs"></div>
</div>

<script>
    function haingana() {
        let t = document.getElementById('t_dep').value;
        let v1 = parseFloat(document.getElementById('m1').value) || 1;
        let v2 = parseFloat(document.getElementById('m2').value) || 1;

        if(!t) return alert("Ampidiro lera!");

        // Lojika tsotra nefa miovaova araka ny lera sy ny multiplier
        let s = (v1 + v2 + new Date().getSeconds()) % 10;
        let c1 = (1.30 + (s/20)).toFixed(2);
        let c2 = (2.10 + (s/10)).toFixed(2);
        let c3 = (4.50 + s).toFixed(2);

        // Kajy lera (+40s, +80s, +120s)
        let parts = t.split(':');
        let d = new Date(); d.setHours(parts[0], parts[1], parts[2]||0);
        const fTime = (sec) => new Date(d.getTime() + sec*1000).toTimeString().split(' ')[0];

        // Asehoy
        document.getElementById('r1').innerText = c1+"x"; document.getElementById('h1').innerText = fTime(40);
        document.getElementById('r2').innerText = c2+"x"; document.getElementById('h2').innerText = fTime(80);
        document.getElementById('r3').innerText = c3+"x"; document.getElementById('h3').innerText = fTime(120);

        // Tantaran'ny valiny
        document.getElementById('logs').innerHTML = `<div class="h-line"><span>${t}</span> <b>${c1}x</b> <span>@ ${fTime(40)}</span></div>` + document.getElementById('logs').innerHTML;
    }
</script>

</body>
</html>
