<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS BET AI - PREDICTION PRO</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --blue: #00d4ff;
            --green: #39ff14;
            --yellow: #ffd700;
            --red: #ff3131;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--blue); margin: 0; font-size: 22px; text-shadow: 0 0 10px var(--blue); }
        #live-clock { font-size: 14px; color: #8b949e; }

        /* Prediction Display */
        .prediction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .p-card {
            background: #0d1117;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #30363d;
        }

        .p-card small { font-size: 10px; display: block; margin-bottom: 5px; color: #8b949e; }
        .p-val { font-weight: bold; font-size: 18px; }
        .sec { color: var(--green); }
        .tent { color: var(--yellow); }
        .risq { color: var(--red); }

        /* Controls */
        .input-group { display: flex; gap: 5px; margin-bottom: 20px; }
        input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        .btn-add { background: var(--blue); color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-clear { background: var(--red); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }

        /* Historique Table */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 10px;
        }

        .history-table th { text-align: left; color: #8b949e; border-bottom: 1px solid #30363d; padding: 8px; }
        .history-table td { padding: 8px; border-bottom: 1px solid #21262d; }

        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-win { background: rgba(57, 255, 20, 0.1); color: var(--green); }
        .badge-wait { background: rgba(255, 215, 0, 0.1); color: var(--yellow); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>BOSS BET AI <span>PREDICTOR</span></h1>
            <div id="live-clock">00:00:00</div>
        </div>

        <div class="prediction-grid">
            <div class="p-card">
                <small>SÉCURITÉ</small>
                <div id="p-sec" class="p-val sec">---</div>
            </div>
            <div class="p-card">
                <small>TENTATIVE</small>
                <div id="p-tent" class="p-val tent">---</div>
            </div>
            <div class="p-card">
                <small>RISQUE</small>
                <div id="p-risq" class="p-val risq">---</div>
            </div>
        </div>

        <div style="text-align:center; margin-bottom: 15px;">
            <small style="color: #8b949e;">Next Departure: </small>
            <span id="dep-time" style="color: var(--blue); font-weight: bold;">--:--:--</span>
        </div>

        <div class="input-group">
            <input type="number" id="val-input" placeholder="Multiplier (ex: 1.45)" step="0.01">
            <button class="btn-add" onclick="analyzeData()">ANALYZE</button>
            <button class="btn-clear" onclick="clearAll()" title="Fafao daholo">🗑️</button>
        </div>

        <div class="history-section">
            <h4 style="margin: 0 0 10px 0;">HISTORIQUE DES PRÉDICTIONS</h4>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>LERA</th>
                        <th>VOKATRA</th>
                        <th>AI SIGNAL</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="h-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let history = [];

        // 1. Clock Function
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString();
        }, 1000);

        // 2. Clear All
        function clearAll() {
            if(confirm("Tena hovonoina daholo ny tantara?")) {
                history = [];
                document.getElementById('h-body').innerHTML = '';
                resetPredictions();
            }
        }

        function resetPredictions() {
            document.getElementById('p-sec').innerText = '---';
            document.getElementById('p-tent').innerText = '---';
            document.getElementById('p-risq').innerText = '---';
            document.getElementById('dep-time').innerText = '--:--:--';
        }

        // 3. Main Algorithm
        function analyzeData() {
            const input = document.getElementById('val-input');
            const val = parseFloat(input.value);
            const now = new Date();
            const timeStr = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0') + ":" + String(now.getSeconds()).padStart(2, '0');

            if (isNaN(val)) return;

            // Alaina ny lera manaraka (Depart + 30s eo ho eo)
            let nextDep = new Date(now.getTime() + 45000); 
            let nextDepStr = nextDep.getHours() + ":" + String(nextDep.getMinutes()).padStart(2, '0') + ":" + String(nextDep.getSeconds()).padStart(2, '0');

            history.unshift({ time: timeStr, result: val });
            if (history.length > 10) history.pop();

            // Lojika fikajiana Côte
            let lowCount = history.slice(0, 3).filter(x => x.result < 1.8).length;
            
            let prediction = { sec: "---", tent: "---", risq: "---", status: "WAITING" };

            if (lowCount >= 2) {
                prediction.sec = "1.35x";
                prediction.tent = "2.10x";
                prediction.risq = "5.00+";
                prediction.status = "SIGNAL ON";
                
                document.getElementById('p-sec').innerText = prediction.sec;
                document.getElementById('p-tent').innerText = prediction.tent;
                document.getElementById('p-risq').innerText = prediction.risq;
                document.getElementById('dep-time').innerText = nextDepStr;
            } else {
                resetPredictions();
            }

            // Update Historique Table
            updateTable(timeStr, val, prediction.sec, prediction.status);
            input.value = '';
        }

        function updateTable(time, val, pred, status) {
            const tbody = document.getElementById('h-body');
            const row = `<tr>
                <td>${time}</td>
                <td style="font-weight:bold; color:${val < 2 ? '#ff3131' : '#39ff14'}">${val.toFixed(2)}x</td>
                <td>${pred}</td>
                <td><span class="badge ${status === 'SIGNAL ON' ? 'badge-win' : 'badge-wait'}">${status}</span></td>
            </tr>`;
            tbody.insertAdjacentHTML('afterbegin', row);
        }
    </script>
</body>
</html>
