<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVIATOR PREDICTOR PRO</title>
    <style>
        :root {
            --bg: #0b0b0b;
            --card: #151515;
            --accent: #ff004c;
            --text: #ffffff;
            --green: #00ff88;
        }

        [data-theme="light"] {
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        /* Mode Nuit/Jour Button */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid var(--text);
            background: transparent;
            color: var(--text);
        }

        /* Digital Clock Top */
        #top-clock {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--green);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .main-app {
            background: var(--card);
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 76, 0.2);
            text-align: center;
            border: 1px solid #333;
        }

        /* RESULTS SECTION */
        .result-box {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px dashed var(--accent);
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
            display: block;
            margin-bottom: 5px;
        }

        .value-time {
            font-size: 2rem;
            font-weight: bold;
            color: var(--text);
            display: block;
            margin-bottom: 15px;
        }

        .value-multiplier {
            font-size: 3rem;
            font-weight: 900;
            color: var(--accent);
            display: block;
        }

        /* THE BUTTON */
        .predict-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .predict-btn:active { transform: scale(0.95); }

        .footer-text {
            margin-top: 15px;
            font-size: 0.7rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">Mode Nuit/Jour</button>

    <div id="top-clock">00:00:00</div>

    <div class="main-app">
        <h2 style="margin-top: 0; font-size: 1rem; opacity: 0.8;">AVIATOR PREDICTOR v3.0</h2>

        <div class="result-box">
            <span class="label">HEURE DU DÉPART</span>
            <span class="value-time" id="departure-time">--:--:--</span>
            
            <hr style="border: 0.5px solid #333; margin: 20px 0;">

            <span class="label">MULTIPLICATEUR (+2 minitra ho ambony)</span>
            <span class="value-multiplier" id="multiplier-val">0.00x</span>
        </div>

        <button class="predict-btn" onclick="startPrediction()">GET PREDICTION</button>

        <div class="footer-text">PRO ALGORITHM BASED ON SERVER TIME</div>
    </div>

    <script>
        // 1. Digital Clock Logic
        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ":" + 
                            now.getMinutes().toString().padStart(2,'0') + ":" + 
                            now.getSeconds().toString().padStart(2,'0');
            document.getElementById('top-clock').innerText = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Theme Logic
        function toggleTheme() {
            document.body.getAttribute('data-theme') === 'light' ? 
            document.body.removeAttribute('data-theme') : 
            document.body.setAttribute('data-theme', 'light');
        }

        // 3. Prediction Logic
        function startPrediction() {
            const btn = document.querySelector('.predict-btn');
            btn.innerText = "ANALYZING...";
            btn.disabled = true;

            setTimeout(() => {
                // Heure du départ: + 1 hatramin'ny 3 minitra amin'ny ora izao
                const now = new Date();
                const randomSeconds = Math.floor(Math.random() * 60);
                now.setMinutes(now.getMinutes() + Math.floor(Math.random() * 2) + 1);
                
                const depTime = now.getHours().toString().padStart(2,'0') + ":" + 
                                now.getMinutes().toString().padStart(2,'0') + ":" + 
                                randomSeconds.toString().padStart(2,'0');

                // Multiplicateur (+2 hatramin'ny 15)
                const mult = (Math.random() * (15.00 - 2.10) + 2.10).toFixed(2);

                document.getElementById('departure-time').innerText = depTime;
                document.getElementById('multiplier-val').innerText = mult + "x";

                btn.innerText = "GET PREDICTION";
                btn.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
