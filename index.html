<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS BET - PREDICTOR PRO</title>
    <style>
        body { background: #05070a; color: white; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .app { max-width: 400px; margin: auto; background: #111; border: 1px solid #333; border-radius: 15px; padding: 20px; }
        h2 { color: #00d4ff; text-align: center; margin-top: 0; text-transform: uppercase; font-size: 18px; }
        
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: #39ff14; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; font-weight: bold; }
        
        .btn-run { width: 100%; padding: 16px; background: #00d4ff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; color: black; text-transform: uppercase; }
        
        .results-area { margin-top: 25px; border-top: 1px solid #333; padding-top: 20px; }
        .res-box { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #00d4ff; }
        
        .res-info b { font-size: 12px; color: #888; display: block; }
        .res-info span { font-size: 20px; font-weight: bold; color: #39ff14; }
        .res-time { text-align: right; }
        .res-time small { display: block; font-size: 10px; color: #888; }
        .res-time b { color: #00d4ff; font-size: 14px; }

        .history { margin-top: 20px; max-height: 150px; overflow-y: auto; font-size: 11px; color: #666; }
    </style>
</head>
<body>

<div class="app">
    <h2>BOSS BET AI ANALYZER</h2>
    
    <label>HEURE DU DÉPART :</label>
    <input type="time" id="t_dep" step="1">

    <label>MULTIPLIER FARANY NIVOAKA :</label>
    <input type="number" id="m_last" placeholder="ex: 1.85" step="0.01">

    <button class="btn-run" onclick="analyze()">HIKAJY VOKATRA (RUN)</button>

    <div class="results-area">
        <div class="res-box" style="border-color: #39ff14;">
            <div class="res-info"><b>SÉCURITÉ</b><span id="v1">---</span></div>
            <div class="res-time"><small>LERA:</small><b id="h1">--:--:--</b></div>
        </div>
        <div class="res-box" style="border-color: orange;">
            <div class="res-info"><b>TENTATIVE</b><span id="v2" style="color:orange">---</span></div>
            <div class="res-time"><small>LERA:</small><b id="h2">--:--:--</b></div>
        </div>
        <div class="res-box" style="border-color: #ff3131;">
            <div class="res-info"><b>RISQUE</b><span id="v3" style="color:#ff3131">---</span></div>
            <div class="res-time"><small>LERA:</small><b id="h3">--:--:--</b></div>
        </div>
    </div>

    <div class="history" id="logs">
        </div>
</div>

<script>
    function analyze() {
        const t = document.getElementById('t_dep').value;
        const m = parseFloat(document.getElementById('m_last').value);

        if(!t || isNaN(m)) {
            alert("Fenoy tsara ny lera sy ny multiplier farany!");
            return;
        }

        // --- ALGORITMA TIME-BASED ---
        // Alaina ny segondra avy amin'ny lera nampidirina
        let parts = t.split(':');
        let sec_base = parseInt(parts[2]) || 0;
        let min_base = parseInt(parts[1]);

        // Formule dynamique miankina amin'ny segondra (sec_base) sy ny multiplier (m)
        let calc1 = (1.20 + ((sec_base % 5) / 10)).toFixed(2);
        let calc2 = (2.00 + ((min_base % 3) / 2)).toFixed(2);
        let calc3 = (Math.max(4.50, (m * 2.5) % 20)).toFixed(2);

        // Fikajiana lera vinavinaina (Add 45s, 90s, 135s)
        const getT = (s) => {
            let d = new Date();
            d.setHours(parts[0], parts[1], parts[2] || 0);
            return new Date(d.getTime() + s * 1000).toTimeString().split(' ')[0];
        };

        // Mise à jour UI
        document.getElementById('v1').innerText = calc1 + "x";
        document.getElementById('h1').innerText = getT(45);
        
        document.getElementById('v2').innerText = calc2 + "x";
        document.getElementById('h2').innerText = getT(90);
        
        document.getElementById('v3').innerText = calc3 + "x";
        document.getElementById('h3').innerText = getT(135);

        // Logs
        let logText = `<div>[${t}] Input: ${m}x -> Prediction: ${calc1}x @ ${getT(45)}</div>`;
        document.getElementById('logs').innerHTML = logText + document.getElementById('logs').innerHTML;
    }
</script>

</body>
</html>
