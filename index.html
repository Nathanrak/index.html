<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS BET - PRO ANALYZER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --neon: #00d4ff; --bg: #05070a; --card: #10141b; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; margin: 0; }
        .app { width: 100%; max-width: 400px; padding: 20px; }
        .screen { display: none; background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0,212,255,0.1); }
        .active { display: block; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--neon); margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #1a1f26; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--neon); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .result-box { background: #000; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--neon); }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .val { font-weight: bold; color: #39ff14; }
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-nav button { flex: 1; padding: 10px; background: #1a1f26; color: white; border: 1px solid #333; border-radius: 5px; cursor: pointer; }
        .tab-nav .active-tab { border-color: var(--neon); color: var(--neon); }
    </style>
</head>
<body>

<div class="app">
    <div class="tab-nav">
        <button id="t1" class="active-tab" onclick="show(1)">INPUT</button>
        <button id="t2" onclick="show(2)">RESULT</button>
    </div>

    <div id="p1" class="screen active">
        <h3 style="color:var(--neon)">CONFIGURATION</h3>
        <div class="input-group">
            <label>SERVER SEED / HASH (Optional):</label>
            <input type="text" id="hash" placeholder="Paste last hash here...">
        </div>
        <div class="input-group">
            <label>LAST MULTIPLIER (1):</label>
            <input type="number" id="m1" step="0.01" placeholder="ex: 2.50">
        </div>
        <div class="input-group">
            <label>LAST MULTIPLIER (2):</label>
            <input type="number" id="m2" step="0.01" placeholder="ex: 1.10">
        </div>
        <button class="btn" onclick="runAnalysis()">RUN PRO ANALYSIS</button>
    </div>

    <div id="p2" class="screen">
        <h3 style="color:#39ff14">PREDICTIONS</h3>
        <div id="results-container">
            </div>
        <button class="btn" style="background:#555; color:white;" onclick="show(1)">BACK TO EDIT</button>
    </div>
</div>

<script>
    function show(p) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active-tab'));
        document.getElementById('p'+p).classList.add('active');
        document.getElementById('t'+p).classList.add('active-tab');
    }

    function runAnalysis() {
        const m1 = parseFloat(document.getElementById('m1').value);
        const m2 = parseFloat(document.getElementById('m2').value);
        const hash = document.getElementById('hash').value || "boss-bet-default-seed";

        if(isNaN(m1) || isNaN(m2)) return alert("Ampidiro ny multiplier farany!");

        // --- PRO ALGORITHM (SHA-256) ---
        // Mitambatra ny input rehetra ho "seed" iray
        const combinedSeed = hash + m1 + m2 + new Date().getMinutes();
        const finalHash = CryptoJS.SHA256(combinedSeed).toString();
        
        // Convert Hash to Multiplier (Logic Provably Fair)
        const hex = finalHash.substring(0, 8);
        const intVal = parseInt(hex, 16);
        const rawMult = (4294967296 / (intVal + 1));
        
        // Generate 3 Tiers
        const sec = Math.max(1.10, Math.min(1.50, rawMult * 0.4)).toFixed(2);
        const tent = Math.max(1.50, Math.min(3.50, rawMult * 0.8)).toFixed(2);
        const risq = Math.max(2.00, rawMult).toFixed(2);

        const now = new Date();
        const timeStr = (m) => new Date(now.getTime() + m*1000).toLocaleTimeString();

        document.getElementById('results-container').innerHTML = `
            <div class="result-box">
                <div class="res-row"><span>SÉCURITÉ:</span> <span class="val">${sec}x</span></div>
                <div class="res-row"><small>Lera:</small> <small>${timeStr(45)}</small></div>
            </div>
            <div class="result-box" style="border-color:orange">
                <div class="res-row"><span>TENTATIVE:</span> <span class="val" style="color:orange">${tent}x</span></div>
                <div class="res-row"><small>Lera:</small> <small>${timeStr(90)}</small></div>
            </div>
            <div class="result-box" style="border-color:red">
                <div class="res-row"><span>RISQUE:</span> <span class="val" style="color:red">${risq}x</span></div>
                <div class="res-row"><small>Lera:</small> <small>${timeStr(150)}</small></div>
            </div>
        `;
        show(2);
    }
</script>
</body>
</html>
