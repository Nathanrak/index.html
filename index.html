<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Digital Clock Pro</title>
    <style>
        /* --- STYLE CSS --- */
        :root {
            --neon-color: #00fff2; /* Couleur initiale */
        }

        body {
            background-color: #050505;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .clock-container {
            text-align: center;
            cursor: pointer;
            user-select: none;
            padding: 40px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        #digital-clock {
            font-family: 'Courier New', Courier, monospace;
            font-size: 5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-color);
            text-shadow: 0 0 10px var(--neon-color), 0 0 25px var(--neon-color);
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        #digital-date {
            font-family: 'Arial', sans-serif;
            font-size: 1.5rem;
            margin-top: 15px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--neon-color);
            opacity: 0.8;
            text-shadow: 0 0 5px var(--neon-color);
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        /* Animation des points clignotants */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.1; }
            100% { opacity: 1; }
        }

        .dots {
            display: inline-block;
            width: 30px;
            text-align: center;
            animation: pulse 1s infinite;
        }

        /* Responsive pour mobile */
        @media (max-width: 600px) {
            #digital-clock { font-size: 3rem; }
            #digital-date { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="clock-container" title="Cliquez pour changer de couleur">
        <div id="digital-clock">
            <span id="hours">00</span><span class="dots">:</span><span id="minutes">00</span><span class="dots">:</span><span id="seconds">00</span>
        </div>
        <div id="digital-date">Chargement...</div>
    </div>

    <script>
        /* --- LOGIQUE JAVASCRIPT --- */

        // 1. Récupérer la couleur sauvegardée au démarrage
        const savedColor = localStorage.getItem('userNeonColor');
        if (savedColor) {
            document.documentElement.style.setProperty('--neon-color', savedColor);
        }

        function updateInterface() {
            const now = new Date();

            // Mise à jour de l'heure (Format 24h)
            document.getElementById('hours').textContent = String(now.getHours()).padStart(2, '0');
            document.getElementById('minutes').textContent = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('seconds').textContent = String(now.getSeconds()).padStart(2, '0');

            // Mise à jour de la date
            const options = { day: '2-digit', month: 'long', year: 'numeric' };
            document.getElementById('digital-date').textContent = now.toLocaleDateString('fr-FR', options);
        }

        // 2. Changer la couleur aléatoirement et sauvegarder
        function changeNeonColor() {
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            document.documentElement.style.setProperty('--neon-color', randomColor);
            localStorage.setItem('userNeonColor', randomColor);
        }

        // 3. Événements
        document.querySelector('.clock-container').addEventListener('click', changeNeonColor);

        // Lancement
        setInterval(updateInterface, 1000);
        updateInterface();
    </script>
</body>
</html>
